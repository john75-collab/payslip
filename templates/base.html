<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Payslip App{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .layout {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 220px;
            background: #003366;
            color: #fff;
            padding: 20px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: #fff;
            text-decoration: none;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .sidebar a:hover {
            background: #0055aa;
        }

        .content {
            flex: 1;
            padding: 20px;
            background: #f5f5f5;
            overflow-y: auto;
        }
    </style>
</head>

<body>

<div class="layout">

    <div class="sidebar">
        <h2>JOSO</h2>
        <a href="/">🏠 Home</a>
        <!--<a href="/dashboard">📋 Dashboard</a>-->
        <a href="/history">📊 Payslip History</a>
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

</div>

</body>
</html>
