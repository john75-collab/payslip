<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Payslip App{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f6fb;
            overflow: hidden;
        }

        .layout {
            display: flex;
            height: 100vh;
        }

        /* ---------- Sidebar ---------- */
        .sidebar {
            width: 230px;
            background: #ffffff;
            border-right: 1px solid #eceef5;
            padding: 25px 18px;
            position:relative;
        }

        /* Top purple gradient */
        .sidebar::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 140px;
        background: linear-gradient(180deg, #8d84ff, #0a2a52);
        
        border-bottom-left-radius: 30px;
        border-bottom-right-radius: 30px;
    }

        .sidebar-content {
            position: relative;
            z-index: 1;
            border-radius: 14px;
        }

        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            margin: 10px 0 30px;
            color: #2d4271;
            border-radius: 14px;
        }

        /* Menu */
        .sidebar a {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #7f8ba3;
            padding: 12px 14px;
            margin-bottom: 10px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            transition: 0.25s ease;
        }

        .sidebar a:hover {
            background: #f3f5fb;
            color: #4b5a77;
            border-radius: 14px;
        }

        .sidebar a.active {
            background: linear-gradient(135deg, #948cff, #0a2a52);
            color: #fff;
            box-shadow: 0 10px 22px rgba(123, 116, 239, 0.25);
        }

        /* ---------- Content ---------- */
        .content {
            flex: 1;
            background: #f7f8fc;
            padding: 25px;
            overflow-y: auto;
        }

        .content::-webkit-scrollbar {
            width: 8px;
        }

        .content::-webkit-scrollbar-thumb {
            background: #d2d8e5;
            border-radius: 10px;
        }

        .page-card {
            min-height: calc(100vh - 50px);
            background: #ffffff;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(38, 51, 77, 0.05);
        }

        /* ---------- Responsive ---------- */
        @media (max-width: 768px) {
            body {
                overflow: auto;
            }

            .layout {
                flex-direction: column;
                height: auto;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #eceef5;
            }

            .content {
                padding: 15px;
            }

            .page-card {
                border-radius: 18px;
                padding: 20px;
            }
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

<div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-content">

            <div class="logo">IGT</div>
            <img src="data:image/jpeg;base64,{{ logo_base64 }}" style="height:70px; border-radius: 25px;">

            <a href="/" class="{% block nav_home %}active{% endblock %}">
                🏠 <span>Home</span>
            </a>

            <a href="/history" class="{% block nav_history %}{% endblock %}">
                📊 <span>Payslip History</span>
            </a>

        </div>
    </div>

    <!-- Content -->
    <div class="content">
        <div class="page-card">
            {% block content %}{% endblock %}
        </div>
    </div>

</div>

</body>
</html>
